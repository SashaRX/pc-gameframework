name: Build & Push to PlayCanvas

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Генерируем .pcconfig для pcsync из GitHub Secrets.
      # Файл не коммитится (.gitignore), создаётся только в CI окружении.
      - name: Generate .pcconfig
        env:
          PC_API_KEY: ${{ secrets.PC_API_KEY }}
          PC_PROJECT_ID: ${{ secrets.PC_PROJECT_ID }}
          PC_BRANCH_ID: ${{ secrets.PC_BRANCH_ID }}
        run: |
          cat > .pcconfig << JSON
          {
            "PLAYCANVAS_USE_CWD_AS_TARGET": "1",
            "PLAYCANVAS_API_KEY": "$PC_API_KEY",
            "PLAYCANVAS_BRANCH_ID": "$PC_BRANCH_ID",
            "PLAYCANVAS_PROJECT_ID": $PC_PROJECT_ID,
            "PLAYCANVAS_BAD_FILE_REG": "^\\\\.|~$",
            "PLAYCANVAS_BAD_FOLDER_REG": "^\\\\.|typings|node_modules",
            "PLAYCANVAS_TARGET_SUBDIR": "build/esm",
            "PLAYCANVAS_CONVERT_TO_POW2": 0
          }
          JSON

      - name: Build
        run: npm run build:clean

      # --skip-build: сборка уже выполнена выше, не повторяем
      - name: Push to PlayCanvas Editor
        env:
          PC_API_KEY: ${{ secrets.PC_API_KEY }}
          PC_PROJECT_ID: ${{ secrets.PC_PROJECT_ID }}
          PC_BRANCH_ID: ${{ secrets.PC_BRANCH_ID }}
        run: node scripts/clean-and-push.js --skip-build
